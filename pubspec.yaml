name: finmann
description: FinMann — Personal Finance Tracker for Students
publish_to: none
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.4
  bloc: ^8.1.4
  equatable: ^2.0.5

  sqflite: ^2.3.0
  path: ^1.8.3

  get_it: ^7.6.7

  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  iconsax: ^0.0.8
  intl: ^0.19.0
  uuid: ^4.3.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans.ttf
    - family: DM Serif Display
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
        - asset: assets/fonts/DMSerifDisplay-Italic.ttf
          style: italic
